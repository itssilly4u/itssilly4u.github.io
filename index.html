<!DOCTYPE html>
<html lang="en">
<head>

    <title>itss_illy | Creator & Developer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1c22;

            flex-direction: column;
            align-items: center;

            background-color: #3f4551;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;

            letter-spacing: 1px;
        }
        a.button:hover { background-color: #f2cc0c; color: #1a1c22; }
        a.button.primary { background-color: #f2cc0c; color: #1a1c22; }
